name: Release Installer To R2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version written into website/downloads/latest.json"
        required: true
        default: "1.0.0"
      skip_frontend_build:
        description: "Skip frontend rebuild during packaging"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-to-r2
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_PUBLIC_BASE_URL: ${{ secrets.CF_R2_PUBLIC_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CF_ACCOUNT_ID)) { throw "Missing secret: CF_ACCOUNT_ID" }
          if ([string]::IsNullOrWhiteSpace($env:CF_API_TOKEN)) { throw "Missing secret: CF_API_TOKEN" }
          if ([string]::IsNullOrWhiteSpace($env:CF_R2_BUCKET)) { throw "Missing secret: CF_R2_BUCKET" }
          if ([string]::IsNullOrWhiteSpace($env:CF_R2_PUBLIC_BASE_URL)) { throw "Missing secret: CF_R2_PUBLIC_BASE_URL" }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $distIndex = ".\design\figma\fluent_v1\dist\index.html"
          $skipRequested = "${{ inputs.skip_frontend_build }}" -eq "true"
          $distExists = Test-Path $distIndex
          if ($skipRequested -and $distExists) {
            Write-Host "skip_frontend_build=true and dist exists, skip frontend build."
            powershell -ExecutionPolicy Bypass -File .\scripts\build_windows_installer.ps1 -SkipFrontendBuild
          } else {
            if ($skipRequested -and -not $distExists) {
              Write-Host "dist not found, fallback to frontend build."
            }
            powershell -ExecutionPolicy Bypass -File .\scripts\build_windows_installer.ps1
          }

      - name: Prepare Pages + R2 artifacts
        shell: pwsh
        run: |
          $installer = Get-ChildItem .\dist_installer -File -Filter "UniqueRecord_Setup_*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "Installer not found in dist_installer."
          }

          powershell -ExecutionPolicy Bypass -File .\scripts\prepare_cloudflare_pages_r2.ps1 `
            -InstallerPath $installer.FullName `
            -Version "${{ inputs.version }}" `
            -R2PublicBaseUrl $env:CF_R2_PUBLIC_BASE_URL

          "INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Wrangler
        shell: pwsh
        run: npm install -g wrangler@4

      - name: Upload installer + manifest to R2
        shell: pwsh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          $uploadRoot = (Resolve-Path .\build\cloudflare_r2_upload\downloads).Path
          Get-ChildItem -Path $uploadRoot -File | ForEach-Object {
            $key = "downloads/$($_.Name)"
            Write-Host "Uploading to R2: $key"
            wrangler r2 object put "$env:CF_R2_BUCKET/$key" --file $_.FullName --remote
          }

      - name: Verify remote R2 manifest
        shell: pwsh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          $verifyDir = ".\build\r2_verify"
          New-Item -ItemType Directory -Path $verifyDir -Force | Out-Null
          $verifyManifest = Join-Path $verifyDir "latest.json"
          wrangler r2 object get "$env:CF_R2_BUCKET/downloads/latest.json" --file $verifyManifest --remote
          if (-not (Test-Path $verifyManifest)) {
            throw "Failed to fetch remote latest.json from R2."
          }
          $content = Get-Content $verifyManifest -Raw -Encoding UTF8
          if ($content -notmatch [regex]::Escape($env:INSTALLER_NAME)) {
            throw "Remote latest.json does not reference expected installer: $env:INSTALLER_NAME"
          }
          Write-Host "Remote R2 manifest verification passed."

      - name: Verify public download domain manifest
        shell: pwsh
        run: |
          $baseUrl = $env:CF_R2_PUBLIC_BASE_URL.Trim().TrimEnd("/")
          if ([string]::IsNullOrWhiteSpace($baseUrl)) {
            throw "CF_R2_PUBLIC_BASE_URL is empty."
          }

          try {
            $baseUri = [Uri]$baseUrl
          } catch {
            throw "CF_R2_PUBLIC_BASE_URL is not a valid URL: $baseUrl"
          }
          if ([string]::IsNullOrWhiteSpace($baseUri.Host)) {
            throw "CF_R2_PUBLIC_BASE_URL has no host: $baseUrl"
          }
          if ($baseUri.AbsolutePath -ne "/") {
            throw "CF_R2_PUBLIC_BASE_URL must be domain root only (no path): $baseUrl"
          }

          $maxAttempts = 18
          $sleepSeconds = 10
          $verified = $false

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            $manifestUrl = "$baseUrl/downloads/latest.json?t=$([DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds())"
            Write-Host "Checking public manifest ($attempt/$maxAttempts): $manifestUrl"
            try {
              $resp = Invoke-WebRequest -UseBasicParsing -Uri $manifestUrl -Method Get -TimeoutSec 30
              if ($resp.StatusCode -ne 200) {
                throw "HTTP $($resp.StatusCode)"
              }

              $contentType = $resp.Headers["Content-Type"]
              $contentText = ""
              if ($resp.Content -is [byte[]]) {
                $contentText = [System.Text.Encoding]::UTF8.GetString($resp.Content)
              } else {
                $contentText = [string]$resp.Content
              }
              $contentText = $contentText.TrimStart([char]0xFEFF)

              $preview = ($contentText -replace "\s+", " ").Trim()
              if ([string]::IsNullOrWhiteSpace($preview)) {
                $preview = "<empty>"
              }
              if ($preview.Length -gt 240) {
                $preview = $preview.Substring(0, 240)
              }

              try {
                $manifest = $contentText | ConvertFrom-Json
              } catch {
                throw "Public manifest is not valid JSON. Content-Type=$contentType, BodyPreview=$preview"
              }

              $manifestFileName = $manifest.file_name
              if ([string]::IsNullOrWhiteSpace($manifestFileName) -and -not [string]::IsNullOrWhiteSpace($manifest.fileName)) {
                $manifestFileName = [string]$manifest.fileName
              }
              if ([string]::IsNullOrWhiteSpace($manifestFileName)) {
                throw "Public manifest missing file_name. Content-Type=$contentType, BodyPreview=$preview"
              }

              if ($manifestFileName -ne $env:INSTALLER_NAME) {
                throw "Expected $env:INSTALLER_NAME, got $manifestFileName"
              }

              if ([string]::IsNullOrWhiteSpace($manifest.url)) {
                throw "Public manifest has empty url field."
              }

              Write-Host "Public manifest verification passed: $manifestFileName"
              $verified = $true
              break
            } catch {
              $errorMessage = $_.Exception.Message
              if ($errorMessage -like "Public manifest missing file_name*") {
                throw "Public download domain verification failed (non-retryable): $errorMessage"
              }
              if ($attempt -eq $maxAttempts) {
                throw "Public download domain verification failed: $errorMessage"
              }
              Write-Host "Public manifest not ready yet: $errorMessage"
              Start-Sleep -Seconds $sleepSeconds
            }
          }

          if (-not $verified) {
            throw "Public download domain verification did not pass."
          }

      - name: Commit website manifest for Pages auto deploy
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/downloads/latest.json
          if (git diff --cached --quiet) {
            Write-Host "No manifest changes to commit."
            exit 0
          }
          git commit -m "chore(release): update website download manifest (${{ inputs.version }})"
          git push

      - name: Summary
        shell: pwsh
        run: |
          Write-Host "Release complete."
          Write-Host "Version: ${{ inputs.version }}"
          Write-Host "Installer: $env:INSTALLER_NAME"
          Write-Host "R2 path: downloads/$env:INSTALLER_NAME"
